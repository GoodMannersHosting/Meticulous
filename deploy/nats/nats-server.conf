# Default local dev: JetStream + monitoring (anonymous clients allowed).
# For JWT lockdown, populate deploy/nats/keys/ with `nsc` exports; the entrypoint switches config automatically.
#
# Explicit listen on all IPv4 interfaces so published port 4222 is reachable from the LAN and from
# other containers (not only via 127.0.0.1 inside this container).
jetstream {
  store_dir: /data
}
listen: "0.0.0.0:4222"
http: "0.0.0.0:8222"
