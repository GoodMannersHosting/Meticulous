# NATS with decentralized JWT (anonymous disabled). Requires:
#   deploy/nats/keys/operator.jwt — operator JWT from `nsc`
#   deploy/nats/keys/jwt/*.jwt    — account JWTs (`nsc push -a <name> -R /etc/nats/keys/jwt` or equivalent)
# `system_account` must match the system account name in your operator JWT (often `SYS`).
jetstream {
  store_dir: /data
}
listen: "0.0.0.0:4222"
http: "0.0.0.0:8222"

operator: "/etc/nats/keys/operator.jwt"
system_account: SYS

resolver: {
  type: full
  dir: "/etc/nats/keys/jwt"
}
