syntax = "proto3";

package meticulous.controller.v1;

import "meticulous/common/v1/types.proto";

// Message types for NATS pub/sub communication.
// These are not gRPC services - they define message formats for NATS.

// Job dispatch message (published by controller, consumed by agents).
// Subject: meticulous.jobs.<pool>.<tags>
message JobDispatch {
    // Job run ID.
    string job_run_id = 1;
    // Run ID.
    string run_id = 2;
    // Organization ID.
    string org_id = 3;
    // Pipeline name.
    string pipeline_name = 4;
    // Job name.
    string job_name = 5;
    // Steps to execute.
    repeated StepSpec steps = 6;
    // Variables for the job.
    map<string, string> variables = 7;
    // Encrypted secrets.
    repeated EncryptedSecret secrets = 8;
    // Job timeout in seconds.
    int32 timeout_secs = 9;
    // Required agent tags.
    repeated string required_tags = 10;
    // Priority (higher = more urgent).
    int32 priority = 11;
    // Cache restore configuration.
    CacheRestore cache_restore = 12;
    // Input artifacts from dependent jobs.
    repeated ArtifactRef input_artifacts = 13;
    // Sidecar services to start.
    repeated ServiceSpec services = 14;
    // Retry policy.
    RetryPolicy retry_policy = 15;
    // Trace ID for distributed tracing.
    string trace_id = 16;
    // Job attempt number (1 for first attempt).
    int32 attempt = 17;
    // When true, agent must call ExchangeJobKeys even if `secrets` is empty (secrets delivered via gRPC).
    bool requires_secret_exchange = 18;
    // Project and pipeline IDs for server-side secret resolution (non-secret metadata).
    string project_id = 19;
    string pipeline_id = 20;
    // JSON [`SecretResolutionHints`](engine): env_name → store path for stored/builtin refs only.
    string secret_resolution_hints_json = 21;
    // When set, workspace is `workspace_dir.join(workspace_root_id)` instead of `job_run_id` (shared-disk affinity).
    string workspace_root_id = 22;
    // When true, agent removes the workspace directory after this job completes (safe with serial shared-workspace groups).
    bool workspace_delete_after_job = 23;
    // When true, successful job completion must not increment `MET_AGENT_EXIT_AFTER_JOBS` (same-run affinity chains).
    bool suppress_exit_after_jobs_increment = 24;
    // Pipeline `workflows[].id` for this job (empty when not from a reusable workflow expansion).
    string workflow_invocation_id = 25;
    // X25519 public key (32 bytes) for wrapping `met-output secret`; empty disables secret outputs for this job.
    bytes output_wrap_x25519_public_key = 26;
    // OCI container environment for this job (ADR-015).
    EnvironmentSpec environment = 27;
    // Workspace snapshot to restore before this job starts (ADR-014).
    WorkspaceSnapshot workspace_restore = 28;
    // Secrets the agent must resolve using ambient identity (ADR-020 local mode).
    repeated ExternalSecretRef agent_resolved_secrets = 29;
    // When set, agent uploads a workspace snapshot to this presigned URL after successful steps (passive affinity snapshots).
    WorkspaceSnapshotUploadSpec workspace_snapshot_upload = 30;
}

// OCI container environment specification (ADR-015, Phase 1.3).
message EnvironmentSpec {
    // Fully qualified image reference (should include @sha256: digest).
    string image = 1;
    // Expected image digest for post-pull verification.
    string expected_digest = 2;
    // Name of the registry credential (resolved to REGISTRY_AUTH material).
    string registry_credential_name = 3;
    // Signature verification method ("cosign" or empty for none).
    string verify_method = 4;
    // Public key reference for cosign verification.
    string verify_key_ref = 5;
    // Pull policy: "always", "if-not-present", or "never".
    string pull_policy = 6;
}

// Workspace snapshot for cross-agent workspace transfer (ADR-014, Phase 3.1).
message WorkspaceSnapshot {
    // Presigned URL to download the snapshot archive.
    string snapshot_download_url = 1;
    // SHA-256 digest of the archive for integrity verification.
    string expected_sha256 = 2;
    // Paths to restore (relative to workspace root).
    repeated string restore_paths = 3;
    // Job run that produced this archive (provenance).
    string producing_job_run_id = 4;
    // Workflow invocation id on the producer job.
    string producing_workflow_invocation_id = 5;
    // Same as expected_sha256 (explicit binding for agents).
    string archive_sha256 = 6;
    // Monotonic generation for this run/affinity chain (engine-assigned).
    int32 snapshot_generation = 7;
}

// Presigned upload target for a workspace snapshot tarball (tar + zstd).
message WorkspaceSnapshotUploadSpec {
    string snapshot_upload_url = 1;
    string object_key = 2;
    int64 max_bytes = 3;
    // When non-empty, only these paths relative to the workspace root are packed (ADR-014 explicit `workspace.outputs`).
    repeated string include_paths = 4;
}

// Result of uploading a workspace snapshot (reported on job completion).
message WorkspaceSnapshotUploadResult {
    bool skipped = 1;
    bool uploaded = 2;
    string sha256 = 3;
    int64 size_bytes = 4;
    string error_message = 5;
    string object_key = 6;
}

// External secret reference for agent-side resolution (ADR-020, Phase 1.2).
message ExternalSecretRef {
    // Provider type (aws_sm, vault, gcp_sm, etc.).
    string provider_type = 1;
    // Environment variable name to set with the resolved value.
    string name = 2;
    // Provider-specific parameters (path, key, version, etc.).
    map<string, string> parameters = 3;
}

// Full job payload message (comprehensive version).
message JobPayload {
    // Job run ID.
    string job_run_id = 1;
    // Run ID.
    string run_id = 2;
    // Organization ID.
    string org_id = 3;
    // Pipeline ID.
    string pipeline_id = 4;
    // Pipeline name.
    string pipeline_name = 5;
    // Job ID (from IR).
    string job_id = 6;
    // Job name.
    string job_name = 7;
    // Steps to execute.
    repeated StepPayload steps = 8;
    // Variables for the job.
    map<string, string> variables = 9;
    // Encrypted secrets (key -> encrypted data).
    map<string, EncryptedSecret> secrets = 10;
    // Cache restore configuration.
    CacheRestore cache_restore = 11;
    // Input artifacts from dependent jobs.
    repeated ArtifactRef input_artifacts = 12;
    // Pool selector for agent matching.
    PoolSelector pool_selector = 13;
    // Job timeout.
    int64 timeout_ms = 14;
    // Retry policy.
    RetryPolicy retry_policy = 15;
    // Sidecar services.
    repeated ServiceSpec services = 16;
    // Trace ID for distributed tracing.
    string trace_id = 17;
    // Job attempt number.
    int32 attempt = 18;
    // Workspace configuration.
    WorkspaceConfig workspace = 19;
}

// Step payload within a job.
message StepPayload {
    // Step run ID.
    string step_run_id = 1;
    // Step ID (from IR).
    string step_id = 2;
    // Step name.
    string name = 3;
    // Command type.
    oneof command {
        ShellCommand shell = 4;
        ActionCommand action = 5;
    }
    // Environment variables.
    map<string, string> env = 6;
    // Working directory (relative to workspace).
    string working_directory = 7;
    // Step timeout in milliseconds.
    int64 timeout_ms = 8;
    // Continue on error flag.
    bool continue_on_error = 9;
    // Execution sequence number.
    int32 sequence = 10;
}

// Shell command execution.
message ShellCommand {
    // Shell type (bash, sh, powershell, etc.).
    string shell = 1;
    // Script content to execute.
    string script = 2;
}

// Built-in action execution.
message ActionCommand {
    // Action name.
    string name = 1;
    // Action version.
    string version = 2;
    // Action inputs.
    map<string, string> inputs = 3;
}

// Cache restore configuration.
message CacheRestore {
    // Primary cache key.
    string key = 1;
    // Fallback restore keys.
    repeated string restore_keys = 2;
    // Presigned download URL (if cache hit).
    string download_url = 3;
    // Paths to restore.
    repeated string paths = 4;
}

// Cache save configuration (included in completion).
message CacheSave {
    // Cache key to save.
    string key = 1;
    // Paths to cache.
    repeated string paths = 2;
}

// Artifact reference for downloading.
message ArtifactRef {
    // Artifact ID.
    string artifact_id = 1;
    // Artifact name.
    string name = 2;
    // Presigned download URL.
    string download_url = 3;
    // SHA-256 checksum.
    string sha256 = 4;
    // Size in bytes.
    int64 size_bytes = 5;
    // Source job run ID.
    string source_job_run_id = 6;
}

// Pool selector for agent matching.
message PoolSelector {
    // Required tags (all must match).
    map<string, string> required_tags = 1;
    // Pool name (alternative to tags).
    string pool_name = 2;
}

// Retry policy configuration.
message RetryPolicy {
    // Maximum number of attempts.
    int32 max_attempts = 1;
    // Initial backoff in milliseconds.
    int64 backoff_ms = 2;
    // Backoff multiplier.
    double backoff_multiplier = 3;
    // Maximum backoff in milliseconds.
    int64 max_backoff_ms = 4;
}

// Service (sidecar container) specification.
message ServiceSpec {
    // Service name.
    string name = 1;
    // Container image.
    string image = 2;
    // Exposed ports.
    repeated int32 ports = 3;
    // Environment variables.
    map<string, string> env = 4;
    // Command override.
    repeated string command = 5;
    // Health check configuration.
    HealthCheck health_check = 6;
}

// Health check configuration.
message HealthCheck {
    // Check type.
    oneof method {
        string cmd = 1;
        string http = 2;
        int32 tcp = 3;
    }
    // Interval between checks in milliseconds.
    int64 interval_ms = 4;
    // Timeout for each check in milliseconds.
    int64 timeout_ms = 5;
    // Retries before marking unhealthy.
    int32 retries = 6;
}

// Workspace configuration.
message WorkspaceConfig {
    // Workspace root path.
    string root = 1;
    // Git repository URL.
    string repo_url = 2;
    // Git ref to checkout.
    string ref = 3;
    // Commit SHA.
    string sha = 4;
}

// Step specification (embedded in JobDispatch).
message StepSpec {
    // Step run ID.
    string step_run_id = 1;
    // Step ID.
    string step_id = 2;
    // Step name.
    string name = 3;
    // Step kind.
    meticulous.common.v1.StepKind kind = 4;
    // Command to execute.
    string command = 5;
    // Container image.
    string image = 6;
    // Working directory.
    string working_dir = 7;
    // Shell to use.
    string shell = 8;
    // Environment variables.
    map<string, string> environment = 9;
    // Execution sequence.
    int32 sequence = 10;
    // Continue on error.
    bool continue_on_error = 11;
    // Step timeout in seconds.
    int32 timeout_secs = 12;
}

// Encrypted secret.
message EncryptedSecret {
    // Secret name.
    string name = 1;
    // Encrypted value.
    bytes encrypted_value = 2;
    // SHA-256 hash.
    string sha256 = 3;
}

// Job claim message (published by agent when claiming a job).
// Subject: meticulous.claims.<job_run_id>
message JobClaim {
    // Job run ID being claimed.
    string job_run_id = 1;
    // Agent ID claiming the job.
    string agent_id = 2;
    // Claim timestamp.
    meticulous.common.v1.Timestamp timestamp = 3;
}

// AEAD envelope produced by the agent for one secret workflow output (see design/workflow-invocation-outputs.md).
message WorkflowSecretEnvelope {
    string name = 1;
    bytes ephemeral_x25519_public = 2;
    bytes nonce = 3;
    bytes ciphertext = 4;
}

// Public + secret outputs for one pipeline workflow invocation id.
message WorkflowInvocationOutputs {
    string workflow_invocation_id = 1;
    map<string, string> public = 2;
    repeated WorkflowSecretEnvelope secrets = 3;
}

// Job completion message (published by agent when job finishes).
// Subject: meticulous.completions.<run_id>
message JobCompletion {
    // Job run ID.
    string job_run_id = 1;
    // Run ID.
    string run_id = 2;
    // Agent ID.
    string agent_id = 3;
    // Final status.
    meticulous.common.v1.RunStatus status = 4;
    // Exit code (if applicable).
    optional int32 exit_code = 5;
    // Error message (if failed).
    string error_message = 6;
    // Duration in milliseconds.
    int64 duration_ms = 7;
    // Timestamp.
    meticulous.common.v1.Timestamp timestamp = 8;
    // Job outputs (key-value pairs).
    map<string, string> outputs = 9;
    // Step completions.
    repeated StepCompletion steps = 10;
    // Uploaded artifacts.
    repeated ArtifactUpload artifacts = 11;
    // Cache save info (if cache was saved).
    CacheSaveResult cache_save = 12;
    // Execution metadata.
    ExecutionMetadata metadata = 13;
    // Structured workflow outputs (preferred over legacy `outputs`).
    repeated WorkflowInvocationOutputs workflow_outputs = 14;
    // Workspace snapshot upload outcome (passive affinity snapshots).
    WorkspaceSnapshotUploadResult workspace_snapshot_result = 15;
}

// Step completion information.
message StepCompletion {
    // Step run ID.
    string step_run_id = 1;
    // Step ID.
    string step_id = 2;
    // Final status.
    meticulous.common.v1.RunStatus status = 3;
    // Exit code.
    optional int32 exit_code = 4;
    // Error message.
    string error_message = 5;
    // Duration in milliseconds.
    int64 duration_ms = 6;
    // Started at timestamp.
    meticulous.common.v1.Timestamp started_at = 7;
    // Finished at timestamp.
    meticulous.common.v1.Timestamp finished_at = 8;
    // Step outputs.
    map<string, string> outputs = 9;
    // Log path in object storage.
    string log_path = 10;
}

// Artifact upload information.
message ArtifactUpload {
    // Artifact name.
    string name = 1;
    // Storage path.
    string storage_path = 2;
    // Content type.
    string content_type = 3;
    // Size in bytes.
    int64 size_bytes = 4;
    // SHA-256 checksum.
    string sha256 = 5;
}

// Cache save result.
message CacheSaveResult {
    // Cache key saved.
    string key = 1;
    // Storage path.
    string storage_path = 2;
    // Size in bytes.
    int64 size_bytes = 3;
    // Whether save was successful.
    bool success = 4;
    // Error message if failed.
    string error_message = 5;
}

// Execution metadata for supply chain tracking.
message ExecutionMetadata {
    // Agent OS.
    string os = 1;
    // Agent architecture.
    string arch = 2;
    // Agent version.
    string agent_version = 3;
    // Container runtime used (if any).
    string container_runtime = 4;
    // Binary hashes for supply chain verification.
    map<string, string> binary_hashes = 5;
    // Environment fingerprint.
    string env_fingerprint = 6;
}

// Agent event (published by controller for agent lifecycle).
// Subject: meticulous.agents.<org_id>
message AgentEvent {
    // Event type.
    AgentEventType type = 1;
    // Agent ID.
    string agent_id = 2;
    // Organization ID.
    string org_id = 3;
    // Agent status.
    meticulous.common.v1.AgentStatus status = 4;
    // Timestamp.
    meticulous.common.v1.Timestamp timestamp = 5;
    // Additional details (JSON).
    string details_json = 6;
}

// Types of agent events.
enum AgentEventType {
    AGENT_EVENT_TYPE_UNSPECIFIED = 0;
    AGENT_EVENT_TYPE_REGISTERED = 1;
    AGENT_EVENT_TYPE_ONLINE = 2;
    AGENT_EVENT_TYPE_OFFLINE = 3;
    AGENT_EVENT_TYPE_DRAINING = 4;
    AGENT_EVENT_TYPE_DECOMMISSIONED = 5;
}

// Run event (published by engine for pipeline execution).
// Subject: meticulous.runs.<pipeline_id>
message RunEvent {
    // Event type.
    RunEventType type = 1;
    // Run ID.
    string run_id = 2;
    // Pipeline ID.
    string pipeline_id = 3;
    // Run status.
    meticulous.common.v1.RunStatus status = 4;
    // Timestamp.
    meticulous.common.v1.Timestamp timestamp = 5;
    // Additional details (JSON).
    string details_json = 6;
}

// Types of run events.
enum RunEventType {
    RUN_EVENT_TYPE_UNSPECIFIED = 0;
    RUN_EVENT_TYPE_QUEUED = 1;
    RUN_EVENT_TYPE_STARTED = 2;
    RUN_EVENT_TYPE_JOB_STARTED = 3;
    RUN_EVENT_TYPE_JOB_COMPLETED = 4;
    RUN_EVENT_TYPE_COMPLETED = 5;
    RUN_EVENT_TYPE_CANCELLED = 6;
}
