syntax = "proto3";

package meticulous.agent.v1;

import "meticulous/common/v1/types.proto";

// Agent registration information.
message AgentInfo {
    // Agent unique identifier (assigned by controller on first registration).
    string agent_id = 1;
    // Human-readable name.
    string name = 2;
    // Operating system.
    string os = 3;
    // CPU architecture.
    string arch = 4;
    // Agent software version.
    string version = 5;
    // Agent pool membership.
    string pool = 6;
    // Tags for job matching.
    repeated string tags = 7;
    // Maximum concurrent jobs.
    int32 max_jobs = 8;
    // Agent capabilities (JSON-encoded).
    string capabilities_json = 9;
}

// Security bundle collected during agent registration.
// Used for environment validation and audit.
message SecurityBundle {
    // Agent hostname.
    string hostname = 1;
    // Operating system.
    string os = 2;
    // CPU architecture.
    string arch = 3;
    // Kernel version.
    string kernel_version = 4;
    // Public IP addresses.
    repeated string public_ips = 5;
    // Private IP addresses.
    repeated string private_ips = 6;
    // Whether NTP is synchronized.
    bool ntp_synchronized = 7;
    // Container runtime (docker, podman, containerd, none).
    string container_runtime = 8;
    // Container runtime version.
    string container_runtime_version = 9;
    // Environment type.
    EnvironmentType environment_type = 10;
    // Agent's long-term X509 public key for identity.
    bytes agent_x509_public_key = 11;
    // Stable machine identifier (e.g. Linux /etc/machine-id, macOS hardware serial).
    string machine_id = 12;
    // Logical CPU count (vCPUs visible to the agent).
    uint32 logical_cpus = 13;
    // Total physical memory in bytes.
    uint64 memory_total_bytes = 14;
    // Outbound (egress) public IPv4/IPv6 as seen by an external service, when discoverable.
    string egress_public_ip = 15;
    // Kubernetes correlation (optional; set by operator / downward API).
    string kubernetes_pod_uid = 16;
    string kubernetes_namespace = 17;
    string kubernetes_node_name = 18;
}

// Type of execution environment.
enum EnvironmentType {
    ENVIRONMENT_TYPE_UNSPECIFIED = 0;
    ENVIRONMENT_TYPE_PHYSICAL = 1;
    ENVIRONMENT_TYPE_VIRTUAL = 2;
    ENVIRONMENT_TYPE_CONTAINER = 3;
}

// Agent capabilities for job matching.
message AgentCapabilities {
    // Operating system.
    string os = 1;
    // CPU architecture.
    string arch = 2;
    // User-defined labels (gpu, high-memory, etc.).
    repeated string labels = 3;
    // Pool tags for NATS subject subscriptions.
    repeated string pool_tags = 4;
    // Maximum concurrent jobs (and optional lifetime cap when controller enforces MET_AGENT_MAX_JOBS).
    int32 max_jobs = 5;
}

// Resource utilization snapshot.
message ResourceSnapshot {
    // CPU utilization (0.0 to 1.0).
    float cpu_percent = 1;
    // Memory utilization (0.0 to 1.0).
    float memory_percent = 2;
    // Disk utilization (0.0 to 1.0).
    float disk_percent = 3;
    // Available memory in bytes.
    int64 available_memory_bytes = 4;
    // Available disk space in bytes.
    int64 available_disk_bytes = 5;
}

// NATS credentials for agent connection.
message NatsCredentials {
    // NATS URL.
    string url = 1;
    // JWT token for authentication.
    string jwt = 2;
    // NKey seed (optional, for NKey auth).
    string nkey_seed = 3;
}

// Agent health and capacity information.
message AgentHealth {
    // Number of jobs currently running.
    int32 running_jobs = 1;
    // Available memory in bytes.
    int64 available_memory_bytes = 2;
    // Available disk space in bytes.
    int64 available_disk_bytes = 3;
    // CPU load (0.0 to 1.0).
    float cpu_load = 4;
}

// Log chunk for streaming.
message LogChunk {
    // Job run ID this log belongs to.
    string job_run_id = 1;
    // Step run ID (optional, for step-specific logs).
    string step_run_id = 2;
    // Log content.
    bytes content = 3;
    // Stream type (stdout or stderr).
    LogStream stream = 4;
    // Sequence number for ordering.
    int64 sequence = 5;
    // Timestamp.
    meticulous.common.v1.Timestamp timestamp = 6;
}

// Log stream type.
enum LogStream {
    LOG_STREAM_UNSPECIFIED = 0;
    LOG_STREAM_STDOUT = 1;
    LOG_STREAM_STDERR = 2;
    // UTF-8 JSON: `ExecBinaryTelemetry` (path, sha256, step_sequence, pid, ppid) redacted before wire.
    LOG_STREAM_EXEC_BINARY = 3;
    // UTF-8 JSON: sanitized syscall record (nr/name, outcome, pid/tid) — never raw pointers / argv.
    LOG_STREAM_SYSCALL = 4;
    // Bounded runtime script evidence (audit + truncation metadata in JSON).
    LOG_STREAM_RUNTIME_SCRIPT = 5;
    // UTF-8 JSON network flow: src/dst IP+port, protocol, direction, pid, optional binary_path + binary_sha256 (best-effort association).
    LOG_STREAM_NETWORK_FLOW = 6;
}

// Job status update from agent.
message JobStatusUpdate {
    // Job run ID.
    string job_run_id = 1;
    // New status.
    meticulous.common.v1.RunStatus status = 2;
    // Exit code (if finished).
    optional int32 exit_code = 3;
    // Error message (if failed).
    string error_message = 4;
    // Timestamp.
    meticulous.common.v1.Timestamp timestamp = 5;
    // Execution metadata (populated on job completion).
    optional JobExecutionMetadata execution_metadata = 6;
    // Agent reporting this update (used when marking job running).
    optional string agent_id = 7;
    // CycloneDX JSON (UTF-8) written under the job workspace (e.g. `sbom.cdx.json`); optional on terminal updates.
    optional string sbom_cyclonedx_json = 8;
}

// Step status update from agent.
message StepStatusUpdate {
    // Step run ID.
    string step_run_id = 1;
    // Job run ID.
    string job_run_id = 2;
    // New status.
    meticulous.common.v1.RunStatus status = 3;
    // Exit code (if finished).
    optional int32 exit_code = 4;
    // Error message (if failed).
    string error_message = 5;
    // Timestamp.
    meticulous.common.v1.Timestamp timestamp = 6;
}

// Metadata about a binary that was executed during a job.
message ExecutedBinary {
    // Absolute path to the binary.
    string path = 1;
    // SHA-256 checksum of the binary file (hex-encoded).
    string sha256 = 2;
    // Number of times this binary was executed.
    uint32 execution_count = 3;
    // First execution timestamp.
    meticulous.common.v1.Timestamp first_executed_at = 4;
    // Last execution timestamp.
    meticulous.common.v1.Timestamp last_executed_at = 5;
    // Step IDs where this binary was executed.
    repeated string step_ids = 6;
    // Step run IDs ([`meticulous.common`]) for correlation with `step_runs` (footprint step name).
    repeated string step_run_ids = 7;
}

// Execution metadata collected during job run.
message JobExecutionMetadata {
    // Job run ID.
    string job_run_id = 1;
    // All binaries that were executed during the job.
    repeated ExecutedBinary executed_binaries = 2;
    // Total number of processes spawned (including nested children).
    uint64 total_processes_spawned = 3;
    // Maximum depth of the process tree.
    uint32 execution_tree_depth = 4;
    // Number of unique binaries executed.
    uint32 unique_binaries_count = 5;
}
