# Build and push met-agent, then Trivy image scan + CycloneDX → sbom.cdx.json.
# Import catalog workflows; set pipeline secrets per the repo-wide self-build docs.
# share-workspace + explicit affinity-group on each workflow: checkout → push → scan (serial).
name: meticulous self-build — met-agent
agent-affinity:
  share-workspace: true

secrets:
  GITHUB_TOKEN:
    stored:
      name: meticulous-ci
  REGISTRY_PASSWORD:
    stored:
      name: harbor-mar-operator-password
  REGISTRY_USERNAME:
    stored:
      name: harbor-mar-operator-username

vars:
  METICULOUS_REPO: GoodMannersHosting/Meticulous
  IMAGE_TAG: latest
  REGISTRY_PREFIX: harbor.cloud.danmanners.com/meticulous

workflows:
  - name: Checkout Meticulous
    id: checkout
    affinity-group: ci
    workflow: global/git-checkout
    version: "1.0.1"
    inputs:
      repo: "${METICULOUS_REPO}"
      ref: main
      clone_path: meticulous
  - name: Build and push met-agent
    id: push-agent
    affinity-group: ci
    workflow: global/docker-buildx-push
    version: "1.0.1"
    depends-on: [checkout]
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.agent
      image_ref: "${REGISTRY_PREFIX}/met-agent:${IMAGE_TAG}"
      registry_host: harbor.cloud.danmanners.com
  - name: Trivy scan met-agent (SBOM)
    id: scan-agent
    affinity-group: ci
    workflow: global/trivy-scan
    version: "1.1.2"
    depends-on: [push-agent]
    inputs:
      mode: image
      target: "${REGISTRY_PREFIX}/met-agent:${IMAGE_TAG}"
      cyclonedx_path: sbom.cdx.json
      registry_host: harbor.cloud.danmanners.com
