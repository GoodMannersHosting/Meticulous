# Meticulous self-hosted CI/CD pipeline.
#
# Triggered by GitHub webhook on push and pull_request events.
# Runs entirely on Meticulous agents — Meticulous builds itself.
#
# Stage flow (affinity group `ci`, shared workspace via S3 snapshots when enabled):
#   checkout → trufflehog / typos / opengrep / setup-rust (parallel where listed) →
#   cargo-lint / cargo-audit / cargo-test (parallel) → ci-seed → api-smoke → playwright;
#   zap (parallel to api-smoke); then docker push + Trivy scans (images) → …
#
#   Finally (main branch only, when wired): kubectl-deploy
#
# share-workspace applies only to invocations with an explicit `affinity-group` (see
# met-parser: default-group alone does not enable shared workspace).
#
# Parallel jobs in this group require agent-affinity.allow-parallel-shared-workspace-jobs
# (passive snapshots + per-job_run_id dirs). Fan-in consumers must set workspace.from to
# the workflows[].id whose snapshot tree they need (see ADR-014 / design/pipeline-authoring.md):
#   ci-seed → cargo-test; push-* → playwright (post-E2E tree; zap runs in parallel).
# Secrets must be stored in Meticulous before running this pipeline.
name: meticulous CI
agent-affinity:
  share-workspace: true
  allow-parallel-shared-workspace-jobs: true

triggers:
  webhook:
    events: [push, pull_request]
    branches: ["*"]

secrets:
  GITHUB_TOKEN:
    stored:
      name: meticulous-ci
  REGISTRY_PASSWORD:
    stored:
      name: harbor-mar-operator-password
  REGISTRY_USERNAME:
    stored:
      name: harbor-mar-operator-username
  MET_CI_BOOTSTRAP_PASSWORD:
    stored:
      name: ci-bootstrap-password

vars:
  METICULOUS_REPO: GoodMannersHosting/Meticulous
  IMAGE_TAG: latest
  REGISTRY_PREFIX: harbor.cloud.danmanners.com/meticulous
  REGISTRY_HOST: harbor.cloud.danmanners.com
  RUST_TOOLCHAIN: stable
  K8S_NAMESPACE: meticulous
  K8S_DEPLOYMENTS: "met-api met-controller met-frontend"
  HEALTH_URL: https://meticulous.cloud.danmanners.com/health

workflows:
  # ── Checkout ──────────────────────────────────────────────────────────────
  - name: Checkout Meticulous
    id: checkout
    workflow: global/git-checkout
    version: "1.0.1"
    affinity-group: ci
    inputs:
      repo: "${METICULOUS_REPO}"
      clone_path: meticulous

  # ── Static checks (serial on shared workspace `ci`) ─────────────────────────
  - name: Secret scan (TruffleHog)
    id: trufflehog
    workflow: global/trufflehog-scan
    version: "1.2.0"
    affinity-group: ci
    depends-on: [checkout]
    inputs:
      scan_path: meticulous
      # TODO: set to "true" once the repo is clean of TruffleHog noise / false positives.
      fail_on_findings: "false"

  - name: Typo check
    id: typos
    workflow: global/typos
    version: "1.1.0"
    affinity-group: ci
    depends-on: [checkout]
    inputs:
      path: meticulous

  - name: SAST (Opengrep)
    id: opengrep
    workflow: global/opengrep
    version: "1.1.2"
    affinity-group: ci
    depends-on: [checkout]
    inputs:
      scan_path: meticulous
      config: "p/rust"
      fail_on_findings: "true"

  # ── Rust toolchain setup ───────────────────────────────────────────────────
  - name: Setup Rust toolchain
    id: setup-rust
    workflow: global/setup-rust
    version: "1.0.0"
    affinity-group: ci
    depends-on: [checkout]
    inputs:
      rust_toolchain: "${RUST_TOOLCHAIN}"

  # ── Lint + audit + test (parallel after setup-rust; see ci-seed workspace.from) ────────────
  - name: Cargo lint
    id: cargo-lint
    workflow: global/cargo-lint
    version: "1.0.0"
    affinity-group: ci
    depends-on: [setup-rust]
    inputs:
      rust_toolchain: "${RUST_TOOLCHAIN}"
      workspace_path: meticulous

  - name: Cargo audit (SCA)
    id: cargo-audit
    workflow: global/cargo-audit
    version: "1.0.0"
    affinity-group: ci
    depends-on: [setup-rust]
    inputs:
      workspace_path: meticulous

  # ── Unit + integration tests ───────────────────────────────────────────────
  - name: Cargo test
    id: cargo-test
    workflow: global/cargo-test
    version: "1.0.0"
    affinity-group: ci
    depends-on: [setup-rust]
    inputs:
      rust_toolchain: "${RUST_TOOLCHAIN}"
      workspace_path: meticulous
      compose_file: docker-compose.yml

  # ── Functional / UI tests (serial on shared workspace; Playwright needs tree) ─
  - name: CI seed (start API + seed data)
    id: ci-seed
    workflow: global/meticulous-ci-seed
    version: "1.0.0"
    affinity-group: ci
    depends-on: [cargo-lint, cargo-audit, cargo-test]
    workspace:
      from: cargo-test
    inputs:
      workspace_path: meticulous
      api_listen: "127.0.0.1:8081"

  - name: API smoke tests
    id: api-smoke
    workflow: global/api-smoke-test
    version: "1.0.1"
    affinity-group: ci
    depends-on: [ci-seed]

  - name: Playwright E2E tests
    id: playwright
    workflow: global/playwright-test
    version: "1.0.1"
    affinity-group: ci
    depends-on: [ci-seed]
    inputs:
      workspace_path: meticulous
      frontend_path: frontend

  - name: DAST scan (ZAP)
    id: zap
    workflow: global/zap-scan
    version: "1.0.1"
    affinity-group: ci
    depends-on: [ci-seed]
    inputs:
      fail_on_warn: "false"

  # ── Docker build + push + Trivy scan (continues shared `ci` workspace) ─────
  - name: Build and push met-agent
    id: push-agent
    workflow: global/docker-buildx-push
    version: &dbxpushversion "1.0.2"
    affinity-group: ci
    depends-on: &tests [api-smoke, playwright, zap]
    workspace:
      from: playwright
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.agent
      image_ref: "${REGISTRY_PREFIX}/met-agent:${IMAGE_TAG}"
      registry_host: "${REGISTRY_HOST}"

  - name: Trivy scan met-agent
    id: scan-agent
    workflow: global/trivy-scan
    version: &trivyscanversion "1.2.0"
    affinity-group: ci
    depends-on: [push-agent]
    inputs:
      mode: image
      target: "${REGISTRY_PREFIX}/met-agent:${IMAGE_TAG}"
      cyclonedx_path: sbom.cdx.json
      registry_host: "${REGISTRY_HOST}"

  - name: Build and push met-api
    id: push-api
    workflow: global/docker-buildx-push
    version: *dbxpushversion
    affinity-group: ci
    depends-on: *tests
    workspace:
      from: playwright
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.met-api
      image_ref: "${REGISTRY_PREFIX}/met-api:${IMAGE_TAG}"
      registry_host: "${REGISTRY_HOST}"

  - name: Trivy scan met-api
    id: scan-api
    workflow: global/trivy-scan
    version: *trivyscanversion
    affinity-group: ci
    depends-on: [push-api]
    inputs:
      mode: image
      target: "${REGISTRY_PREFIX}/met-api:${IMAGE_TAG}"
      cyclonedx_path: sbom.cdx.json
      registry_host: "${REGISTRY_HOST}"

  - name: Build and push met-controller
    id: push-controller
    workflow: global/docker-buildx-push
    version: *dbxpushversion
    affinity-group: ci
    depends-on: *tests
    workspace:
      from: playwright
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.met-controller
      image_ref: "${REGISTRY_PREFIX}/met-controller:${IMAGE_TAG}"
      registry_host: "${REGISTRY_HOST}"

  - name: Trivy scan met-controller
    id: scan-controller
    workflow: global/trivy-scan
    version: *trivyscanversion
    affinity-group: ci
    depends-on: [push-controller]
    inputs:
      mode: image
      target: "${REGISTRY_PREFIX}/met-controller:${IMAGE_TAG}"
      cyclonedx_path: sbom.cdx.json
      registry_host: "${REGISTRY_HOST}"

  - name: Build and push met-frontend
    id: push-frontend
    workflow: global/docker-buildx-push
    version: *dbxpushversion
    affinity-group: ci
    depends-on: *tests
    workspace:
      from: playwright
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile
      image_ref: "${REGISTRY_PREFIX}/met-frontend:${IMAGE_TAG}"
      registry_host: "${REGISTRY_HOST}"

  - name: Trivy scan met-frontend
    id: scan-frontend
    workflow: global/trivy-scan
    version: *trivyscanversion
    affinity-group: ci
    depends-on: [push-frontend]
    inputs:
      mode: image
      target: "${REGISTRY_PREFIX}/met-frontend:${IMAGE_TAG}"
      cyclonedx_path: sbom.cdx.json
      registry_host: "${REGISTRY_HOST}"

  - name: Build and push sqlx-migrate
    id: push-sqlx-migrate
    workflow: global/docker-buildx-push
    version: *dbxpushversion
    affinity-group: ci
    depends-on: *tests
    workspace:
      from: playwright
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.sqlx-migrate
      image_ref: "${REGISTRY_PREFIX}/met-sqlx-migrate:${IMAGE_TAG}"
      registry_host: "${REGISTRY_HOST}"

  - name: Trivy scan sqlx-migrate
    id: scan-sqlx-migrate
    workflow: global/trivy-scan
    version: *trivyscanversion
    affinity-group: ci
    depends-on: [push-sqlx-migrate]
    inputs:
      mode: image
      target: "${REGISTRY_PREFIX}/met-sqlx-migrate:${IMAGE_TAG}"
      cyclonedx_path: sbom.cdx.json
      registry_host: "${REGISTRY_HOST}"
