# Example: build and push every Meticulous service image from the repo-root Dockerfiles.
# Dockerfiles: Dockerfile.agent, Dockerfile.met-api, Dockerfile.met-controller, Dockerfile.sqlx-migrate.
#
# Import catalog workflows first; set pipeline secrets: GITHUB_TOKEN (or catalog credential),
# REGISTRY_USERNAME / REGISTRY_PASSWORD (global/docker-buildx-push and global/trivy-scan read these env names).
# Map them to your Harbor robot credentials via stored: name — do not rename to HARBOR_* or login will not see them.
# Trivy on PATH (global/trivy-scan ≥ 1.1.2), and git for checkout.
#
# share-workspace + agent-affinity require a total depends-on order (no concurrent jobs in the group).
# Flow per image: push then Trivy image scan + CycloneDX → sbom.cdx.json; the agent uploads that file
# to the control plane when the scan job finishes (run SBOM tab).
#
# Re-import `trivy-scan` from this repo after bumping (registry login for private image pull).
name: meticulous self-build
agent-affinity:
  default-group: ci
  share-workspace: true

secrets:
  GITHUB_TOKEN:
    stored:
      name: meticulous-ci
  REGISTRY_PASSWORD:
    stored:
      name: harbor-mar-operator-password
  REGISTRY_USERNAME:
    stored:
      name: harbor-mar-operator-username

vars:
  METICULOUS_REPO: GoodMannersHosting/Meticulous
  IMAGE_TAG: latest
  REGISTRY_PREFIX: harbor.cloud.danmanners.com/meticulous

workflows:
  - name: Checkout Meticulous
    id: checkout
    workflow: global/git-checkout
    version: "1.0.1"
    inputs:
      repo: "${METICULOUS_REPO}"
      ref: main
      clone_path: meticulous
  # Meticulous Agent
  - name: Build and push met-agent
    id: push-agent
    workflow: &docker-buildx-push global/docker-buildx-push
    version: &docker-buildx-push-version "1.0.1"
    depends-on: [checkout]
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.agent
      image_ref: &agent_image_ref "${REGISTRY_PREFIX}/met-agent:${IMAGE_TAG}"
      registry_host: harbor.cloud.danmanners.com
  - name: Trivy scan met-agent (SBOM)
    id: scan-agent
    workflow: global/trivy-scan
    version: &trivy-scan-version "1.1.2"
    depends-on: [push-agent]
    inputs:
      mode: image
      target: *agent_image_ref
      cyclonedx_path: sbom.cdx.json
      registry_host: harbor.cloud.danmanners.com
  # Meticulous API
  - name: Build and push met-api
    id: push-api
    workflow: *docker-buildx-push
    version: *docker-buildx-push-version
    depends-on: [scan-agent]
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.met-api
      image_ref: &api_image_ref "${REGISTRY_PREFIX}/met-api:${IMAGE_TAG}"
      registry_host: harbor.cloud.danmanners.com
  - name: Trivy scan met-api (SBOM)
    id: scan-api
    workflow: global/trivy-scan
    version: *trivy-scan-version
    depends-on: [push-api]
    inputs:
      mode: image
      target: *api_image_ref
      cyclonedx_path: sbom.cdx.json
      registry_host: harbor.cloud.danmanners.com
  # Meticulous Controller
  - name: Build and push met-controller
    id: push-controller
    workflow: *docker-buildx-push
    version: *docker-buildx-push-version
    depends-on: [scan-api]
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.met-controller
      image_ref: &controller_image_ref "${REGISTRY_PREFIX}/met-controller:${IMAGE_TAG}"
      registry_host: harbor.cloud.danmanners.com
  - name: Trivy scan met-controller (SBOM)
    id: scan-controller
    workflow: global/trivy-scan
    version: *trivy-scan-version
    depends-on: [push-controller]
    inputs:
      mode: image
      target: *controller_image_ref
      cyclonedx_path: sbom.cdx.json
      registry_host: harbor.cloud.danmanners.com
  # Meticulous SQLx Migrate
  - name: Build and push sqlx-migrate
    id: push-sqlx-migrate
    workflow: *docker-buildx-push
    version: *docker-buildx-push-version
    depends-on: [scan-controller]
    inputs:
      context_path: meticulous
      dockerfile: Dockerfile.sqlx-migrate
      image_ref: &sqlx_migrate_image_ref "${REGISTRY_PREFIX}/met-sqlx-migrate:${IMAGE_TAG}"
      registry_host: harbor.cloud.danmanners.com
  - name: Trivy scan sqlx-migrate (SBOM)
    id: scan-sqlx-migrate
    workflow: global/trivy-scan
    version: *trivy-scan-version
    depends-on: [push-sqlx-migrate]
    inputs:
      mode: image
      target: *sqlx_migrate_image_ref
      cyclonedx_path: sbom.cdx.json
      registry_host: harbor.cloud.danmanners.com
  # Meticulous Frontend
  - name: Build and push met-frontend
    id: push-frontend
    workflow: *docker-buildx-push
    version: *docker-buildx-push-version
    depends-on: [scan-sqlx-migrate]
    inputs:
      context_path: meticulous/frontend
      dockerfile: Dockerfile
      image_ref: &frontend_image_ref "${REGISTRY_PREFIX}/met-frontend:${IMAGE_TAG}"
      registry_host: harbor.cloud.danmanners.com
  - name: Trivy scan met-frontend (SBOM)
    id: scan-frontend
    workflow: global/trivy-scan
    version: *trivy-scan-version
    depends-on: [push-frontend]
    inputs:
      mode: image
      target: *frontend_image_ref
      cyclonedx_path: sbom.cdx.json
      registry_host: harbor.cloud.danmanners.com