name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux musl targets (fully static binaries, preferred for production)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: met-linux-amd64-static
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: met-linux-arm64-static
            use_cross: true
          # Linux GNU targets (for compatibility with glibc systems)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: met-linux-amd64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: met-linux-arm64
            use_cross: true
          # macOS targets
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: met-darwin-amd64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: met-darwin-arm64
            use_cross: false
          # Windows target
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: met-windows-amd64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Install cross-compilation tools (GNU)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross (for musl builds)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release (with cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} --bin met --bin met-api --bin met-agent
        env:
          SQLX_OFFLINE: true
          CROSS_CONTAINER_ENGINE: podman

      - name: Build release (native)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} --bin met --bin met-api --bin met-agent
        env:
          SQLX_OFFLINE: true

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/met dist/
          cp target/${{ matrix.target }}/release/met-api dist/
          cp target/${{ matrix.target }}/release/met-agent dist/
          tar -czvf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\met.exe dist\
          copy target\${{ matrix.target }}\release\met-api.exe dist\
          copy target\${{ matrix.target }}\release\met-agent.exe dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
